<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Actions Site</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4ff;
           display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .card { background:white; border-radius:12px; padding:40px 60px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1); text-align:center; }
    h1 { color:#1F4E79; } p { color:#555; }
    .badge { background:#1F4E79; color:white; padding:6px 16px;
             border-radius:20px; display:inline-block; margin-top:16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Deployed by GitHub Actions!</h1>
    <p>Every push to main triggers an automatic redeploy.</p>
    <span class="badge">CI/CD in Action</span>
  </div>
</body>
</html>
